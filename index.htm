<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>TicketMatch — FC GenV</title>
    <link href="./css.css" rel="stylesheet">
</head>

<body>
    <header>
        <nav class="nav">
            <a href="index.htm">TicketMatch</a>
            <ul>
                <li>
                    <a href="#acceuil">Acceuil</a>
                    <a href="#matches">Matches</a>
                    <a href="#reservations">Reservations</a>
                </li>
            </ul>
        </nav>
    </header>
    <main>
        <section>
            <h2 class="title">
                Prochain match
            </h2>
            <article>
                <p>Genv <span>vs</span>Void</p>
            </article>
        </section>
        <section>
            <h2>A propos du club</h2>
            <p>description of club</p>
        </section>

        <section>
            <h2>Reservation</h2>
            <div>
                <form>
                    <div class="flex flex-col">
                        <label for="name">Nom</label>
                        <input type="text" class="p-10 radius-sm border-gris" id="name" name="name" required>
                    </div>

                    <div class="flex flex-col">
                        <label for="email">email</label>
                        <input type="email" class="p-10 radius-sm border-gris" id="email" name="email" required>
                    </div>

                    <div class="flex flex-col">
                        <label for="phone">Phone</label>
                        <input type="number" class="p-10 radius-sm border-gris" id="phone" name="phone" required>
                    </div>
                    <div class="flex flex-col">
                        <select name="match" class="p-10 radius-sm border-gris">
                        <option disabled selected hidden>Select</option>
                        <option value="0">FC GenV vs OC Youssoufia — 15/03/2026 </option>
                        <option value="1">FC GenV vs FC Bayern — 22/03/2026 </option>
                        <option value="2">FC GenV vs Madrid CF — 05/04/2026 </option>
                    </select>
                    </div>
                    

                    <div class="flex flex-col">
                        <div>
                            <label for="Tribune">Tribune</label>
                            <input id="Tribune"  type="radio" name="category" value="Tribune">
                        </div>
                        <div>
                            <label for="Virage">Virage</label>
                            <input type="radio" name="category" value="Virage">
                        </div>
                        <div>
                            <label for="Pelouse">Pelouse</label>
                            <input type="radio" name="category" value="Pelouse">
                        </div>
                        <div class="flex flex-col">
                            <label for="number">nombre de tickets</label>
                            <input type="number" class="p-10 radius-sm border-gris" max="10" min="1" name="number" id="number">
                        </div>
                        <div class="flex flex-col">
                            <label for="comment">Comment</label>
                            <textarea name="comment" class="p-10 radius-sm border-gris" id="comment" placeholder="write something here">
                    </textarea>
                        </div>
                        <div>
                            <label for="agreement">J'accepte les conditions générales</label>
                            <input type="checkbox" name="agreement" id="agreement" required>
                        </div>

                        <input type="submit" value=" Réserver mon ticket " class="primary-btn">

                    </div>

                </form>
            </div>
        </section>
    </main>
    <footer>
        © 2026 FC GenV — Tous droits réservés
    </footer>
</body>

</html>
